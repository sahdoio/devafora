networks:
  devafora-network:
    driver: bridge
    ipam:
      driver: default

services:
  devafora-nginx:
    container_name: devafora-nginx
    image: nginx
    ports:
      - '${FORWARD_NGINX_PORT:-8080}:80'
    depends_on:
      - devafora
    volumes:
      - ./:/var/www
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
    networks:
      - devafora-network

  devafora:
    container_name: devafora
    build:
      context: docker
      dockerfile: app.Dockerfile
    entrypoint: [ "/bin/sh", "/scripts/entrypoint.sh" ]
    command: php-fpm
    image: devafora
    volumes:
      - ./:/var/www
      - ./docker/scripts:/scripts:ro
      - ./docker/php/phpfpm.conf:/usr/local/etc/php-fpm.d/www.conf
      - ./docker/php/local.ini:/usr/local/etc/php/php.ini
    networks:
      - devafora-network

  devafora-db:
    container_name: devafora-db
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: devafora
      MYSQL_USER: devafora
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - '${FORWARD_DB_PORT:-3306}:3306'
    volumes:
      - devafora-db-volume:/var/lib/mysql
    networks:
      - devafora-network

  devafora-nodejs:
    container_name: devafora-nodejs
    build:
      context: docker
      dockerfile: nodejs.Dockerfile
    image: devafora/nodejs
    environment:
      # No PHP in this container; the wayfinder types are generated by the php
      # container (`make wayfinder`). Make the plugin's php call a no-op here.
      WAYFINDER_COMMAND: 'true'
    ports:
      - '${FORWARD_VITE_PORT:-5173}:${FORWARD_VITE_PORT:-5173}'
    volumes:
      - ./:/var/www
    networks:
      - devafora-network

  devafora-redis:
    container_name: devafora-redis
    image: redis:alpine
    restart: unless-stopped
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    networks:
      - devafora-network

volumes:
  devafora-db-volume:
